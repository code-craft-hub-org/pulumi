name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # ── Lint, typecheck, unit tests ───────────────────────────────────────────
  quality:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm test

  # ── Validate Pulumi TypeScript compiles ───────────────────────────────────
  infra-typecheck:
    name: Infra Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: infra/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: npx tsc --noEmit

  # ── Docker build (no push — validates Dockerfile only) ───────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: app
          push: false
          tags: hello-app:pr-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
